<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #a2d149; font-family: 'Comic Sans MS', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .farm-area { background: #8b5a2b; padding: 40px; border-radius: 30px; border: 8px solid #5d3a1a; box-shadow: 0 10px 0 #3d2611; text-align: center; }
        .word-to-type { font-size: 48px; color: white; text-shadow: 2px 2px 0 #000; margin-bottom: 20px; letter-spacing: 5px; }
        input { font-size: 24px; padding: 10px; border-radius: 15px; border: none; outline: none; text-align: center; }
        .stats { margin-top: 20px; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="farm-area">
        <div id="icon">🌱</div>
        <div class="word-to-type" id="targetWord">CARROT</div>
        <input type="text" id="typer" autofocus placeholder="Печатай тут...">
        <div class="stats">Уровень: <span id="lvl">1</span> | Монеты: <span id="coins">0</span></div>
    </div>

    <script>
        const target = document.getElementById('targetWord');
        const input = document.getElementById('typer');
        const coinsEl = document.getElementById('coins');
        let coins = 0;

        input.addEventListener('input', () => {
            if (input.value.toUpperCase() === target.innerText) {
                coins += 10;
                coinsEl.innerText = coins;
                input.value = '';
                // Тут будет смена слова
                target.innerText = "APPLE";
                document.getElementById('icon').innerText = "🍎";
            }
        });
    </script>
</body>
</html>
